<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AudioGrab - MP3 Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body
    class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6"
  >
    <div
      class="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700"
    >
      <div class="text-center mb-8">
        <div
          class="bg-indigo-500 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/20"
        >
          <i data-lucide="music" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">AudioGrab</h1>
        <p class="text-slate-400 text-sm mt-2">
          Unduh audio dari link favoritmu dengan mudah.
        </p>
      </div>

      <form
        action="/download"
        method="POST"
        id="downloadForm"
        class="space-y-5"
      >
        <div>
          <label
            class="block text-xs font-semibold text-slate-500 uppercase mb-2 ml-1"
            >Tautan Media</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500"
            >
              <i data-lucide="link" class="w-4 h-4"></i>
            </div>
            <input
              type="url"
              name="url"
              id="urlInput"
              required
              class="block w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-slate-600"
              placeholder="Tempel link video/lagu di sini..."
            />
          </div>
        </div>

        <div>
          <label
            for="formatSelect"
            class="block text-xs font-semibold text-slate-500 uppercase mb-2 ml-1"
            >Pilih Format</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500"
            >
              <i data-lucide="file-audio" class="w-4 h-4"></i>
            </div>
            <select
              name="format"
              id="formatSelect"
              class="block w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-10 pr-10 text-sm text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none transition-all cursor-pointer"
            >
              <option value="mp3">Audio MP3 (Kompresi)</option>
              <option value="wav">Audio WAV (Kualitas Tinggi)</option>
              <option value="flac">Audio FLAC (Lossless)</option>
              <option value="m4a">Audio M4A (Apple)</option>
            </select>
            <div
              class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-500"
            >
              <i data-lucide="chevron-down" class="w-4 h-4"></i>
            </div>
          </div>
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-600/20 transition-all flex items-center justify-center gap-2 group"
        >
          <span id="btnText">Download MP3</span>
          <i
            data-lucide="download"
            id="btnIcon"
            class="w-4 h-4 group-hover:translate-y-0.5 transition-transform"
          ></i>
          <div
            id="spinner"
            class="hidden animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"
          ></div>
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-700 text-center">
        <p class="text-[10px] text-slate-500 uppercase tracking-widest">
          Powered by Python & yt-dlp
        </p>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
